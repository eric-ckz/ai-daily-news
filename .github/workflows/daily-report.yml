name: Daily AI News Report

on:
  schedule:
    - cron: '0 0 * * *' # 08:00 Asia/Shanghai (primary)
    - cron: '5 0 * * *' # 08:05 Asia/Shanghai (fallback)
  workflow_dispatch:

concurrency:
  group: daily-report-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run backend pipeline
        working-directory: backend
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_CHAT_PATH: ${{ secrets.LLM_CHAT_PATH }}
          LLM_AUTH_HEADER: ${{ secrets.LLM_AUTH_HEADER }}
          LLM_AUTH_SCHEME: ${{ secrets.LLM_AUTH_SCHEME }}
          LLM_TIMEOUT_SECONDS: '15'
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: mvn -q spring-boot:run

      - name: Commit daily markdown report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/*.md frontend/public/data/daily-summary.json || true
          if git diff --cached --quiet; then
            echo "No report changes to commit"
          else
            git commit -m "chore(report): daily news $(date -u +%F)"
            git push
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
